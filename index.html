<html lang="en">

    <title>Vortex Athletics - Transform Youth Athletes Into Champions</title>
    <meta name="description" content="Vortex Athletics is a premier youth athletic development center. Gymnastics, ninja, strength, athleticism programs, classes, events, and development-first coaching." />
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    <!-- Consent Mode v2 defaults — must run before GTM and gtag.js so every tag starts denied until the cookie banner grants consent -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        analytics_storage: 'denied',
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        wait_for_update: 500
      });
      // Preserve attribution across Vortex-owned domains while preventing ad-click
      // identifiers from being sent when advertising storage is denied.
      gtag('set', 'ads_data_redaction', true);
      gtag('set', 'url_passthrough', true);
      gtag('set', 'linker', {
        domains: [
          'vortexathletics.com',
          'vortex-gymnastics.com',
          'vortex-lacross.com',
          'vortex-conditioning.com',
          'vortex-football.com',
          'vortex-basketball.com',
          'vortex-track.com',
          'vortex-fit.com',
          'vortex-athlete.com',
          'vortex-soccer.com',
          'vortex-reps.com'
        ]
      });
    </script>
    <!-- Google Tag Manager -->

    })(window,document,'script','dataLayer','GTM-T38PSLXX');</script>
    <!-- End Google Tag Manager -->
    <!-- Google tag (gtag.js) — send_page_view disabled; SPA routes report via trackGooglePageView -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XDE178DQWY"></script>

      gtag('js', new Date());
      gtag('config', 'G-XDE178DQWY', { send_page_view: false });
    </script>
