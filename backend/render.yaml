# Render Blueprint — Web Service for Vortex API
# Dashboard: New > Blueprint > connect repo, or set these on an existing service manually.
services:
  - type: web
    name: vortex-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Optional — portal message attachments, exercise media, form-review video
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
